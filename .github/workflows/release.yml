name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: sentinel-linux-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: sentinel-macos-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: sentinel-macos-amd64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        run: |
          cp target/${{ matrix.target }}/release/sentinel ${{ matrix.name }}
          chmod +x ${{ matrix.name }}
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            --repo "${{ github.repository }}" \
            --title "Sentinel $TAG_NAME" \
            --generate-notes \
            sentinel-linux-amd64 \
            sentinel-macos-arm64 \
            sentinel-macos-amd64
